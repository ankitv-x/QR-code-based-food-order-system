<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodieExpress | Chef Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        body {
            background: #0f0f14;
            padding: 24px;
            min-height: 100vh;
        }
        .chef-dashboard {
            background: #1e1f2c;
            border-radius: 32px;
            padding: 28px 32px;
            color: #f0ede8;
            max-width: 1400px;
            margin: 0 auto;
        }
        .chef-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 2px dashed #ff7b2c;
            padding-bottom: 18px;
            margin-bottom: 28px;
        }
        .chef-header h2 {
            font-size: 2rem;
            background: linear-gradient(120deg, #ffaa66, #ff6a2c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #2a2c3b;
            border-radius: 24px;
            padding: 15px 24px;
            flex: 1;
        }
        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffaa66;
        }
        .orders-list {
            max-height: 65vh;
            overflow-y: auto;
        }
        .order-item {
            background: #2a2c3b;
            border-radius: 24px;
            margin-bottom: 18px;
            padding: 18px 24px;
            border-left: 6px solid #ff9f4a;
        }
        .order-items-list {
            background: #1f212e;
            border-radius: 18px;
            padding: 14px;
            margin: 10px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .item-tag {
            background: #3d3f54;
            padding: 6px 16px;
            border-radius: 30px;
        }
        .complete-btn {
            background: none;
            border: 1.5px solid #ff8c4a;
            color: #ffaa77;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .complete-btn:hover {
            background: #ff7b2c;
            color: white;
        }
        .empty-orders {
            text-align: center;
            padding: 60px 20px;
            color: #9e9bb1;
        }
        .sync-controls {
            background: #2a2c3b;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        input {
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin: 5px;
        }
        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: #ff7b2c;
            color: white;
        }
    </style>
</head>
<body>
<div class="chef-dashboard">
    <div class="chef-header">
        <h2>👨‍🍳 CHEF DASHBOARD</h2>
        <div style="background: #2c2f3f; padding: 8px 20px; border-radius: 50px;">
            <span id="connectionStatus">🟢 Live</span>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Pending Orders</div>
            <div class="stat-number" id="pendingCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Today</div>
            <div class="stat-number" id="totalCount">0</div>
        </div>
    </div>

    <div id="ordersContainer" class="orders-list">
        <div class="empty-orders">No orders yet. Waiting for customer orders...</div>
    </div>
</div>

<script>
    let orders = [];
    
    function loadOrders() {
        const stored = localStorage.getItem('pending_orders');
        if (stored) {
            orders = JSON.parse(stored);
        } else {
            orders = [];
        }
        renderDashboard();
    }
    
    function renderDashboard() {
        const container = document.getElementById('ordersContainer');
        const pending = orders.filter(o => !o.completed);
        
        // document.getElementById('pendingCount').innerText = pending.length;
        // document.getElementById('totalCount').innerText = orders.length;

        // change here 

        document.getElementById('pendingCount').innerText = pending.length;

// Keep total count increasing only
let totalOrders = localStorage.getItem('total_orders_count');

if (!totalOrders) {
    totalOrders = orders.length;
} else {
    totalOrders = parseInt(totalOrders);

    // Increase only when new pending orders are added
    if (orders.length > totalOrders) {
        totalOrders = orders.length;
    }
}

localStorage.setItem('total_orders_count', totalOrders);
document.getElementById('totalCount').innerText = totalOrders;

        //to here
        
        if (pending.length === 0) {
            container.innerHTML = '<div class="empty-orders">✨ No pending orders. Kitchen ready! ✨</div>';
            return;
        }
        
        container.innerHTML = pending.map(order => `
            <div class="order-item">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <strong>🧾 ${order.id}</strong>
                    <span>⏱️ ${order.time}</span>
                </div>
                <div class="order-items-list">
                    ${order.items.map(item => `<span class="item-tag">🍽️ ${item.name} ${item.price}</span>`).join('')}
                </div>
                <button class="complete-btn" onclick="completeOrder('${order.id}')">✅ MARK AS DONE</button>
            </div>
        `).join('');
    }
    
    function completeOrder(orderId) {
        orders = orders.filter(o => o.id !== orderId);
        localStorage.setItem('pending_orders', JSON.stringify(orders));
        loadOrders();
        window.dispatchEvent(new Event('storage'));
    }
    
    // Listen for changes from menu page
    window.addEventListener('storage', () => {
        loadOrders();
    });
    
    // Auto-refresh every 2 seconds
    setInterval(loadOrders, 2000);
    loadOrders();
</script>
</body>
</html>
