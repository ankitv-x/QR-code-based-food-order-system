<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FoodieExpress | Mobile Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        body {
            background: #f5f2e8;
            min-height: 100vh;
        }
        .menu-dashboard {
            background: #fff4ea;
            padding: 18px 16px 30px;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }
        .menu-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d64b2c, #f09a3c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .cart-badge {
            background: #ffefe3;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: bold;
            color: #c2410c;
            border: 1px solid #ffd3b5;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
            margin: 20px 0 28px;
        }
        .food-card {
            background: white;
            border-radius: 28px;
            padding: 12px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #ffdec2;
        }
        .food-card.selected {
            background: #fff1e6;
            border: 2px solid #ff7b2c;
        }
        .food-emoji { font-size: 2.8rem; display: block; margin-bottom: 6px; }
        .food-name { font-weight: 700; font-size: 1.1rem; margin: 6px 0 4px; }
        .food-price { font-weight: 600; color: #c2410c; }
        .btn {
            border: none;
            cursor: pointer;
            font-weight: 600;
            border-radius: 40px;
            background: #ff7b2c;
            color: white;
            padding: 12px 20px;
            margin: 5px;
        }
        .btn-secondary { background: #2c3e66; }
        .toast-msg {
            background: #2c2c2c;
            color: #ffd89a;
            padding: 10px;
            border-radius: 40px;
            text-align: center;
            margin-top: 15px;
            opacity: 0;
            transition: 0.2s;
        }
        .sync-instruction {
            background: #ffe6d5;
            padding: 15px;
            border-radius: 20px;
            margin-top: 20px;
            font-size: 12px;
        }
        @media (max-width: 600px) {
            .items-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
    </style>
</head>
<body>
<div class="menu-dashboard">
    <div class="menu-header">
        <h1>🍽️ FEAST MENU</h1>
        <div class="cart-badge" id="cartCountBadge">0 selected</div>
    </div>
    <div class="items-grid" id="itemsGrid"></div>
    <div class="order-actions">
        <button class="btn" id="confirmOrderBtn">✨ CONFIRM ORDER ✨</button>
        <button class="btn btn-secondary" id="clearSelectionBtn">🗑️ Deselect All</button>
    </div>
    <div id="menuToast" class="toast-msg"></div>
    
    <div class="sync-instruction">
        <strong>📱 How to sync with Chef Dashboard:</strong><br>
        1. Open chef.html on your laptop<br>
        2. Click "Start Sync Server" button<br>
        3. Enter the same Room Code on both devices<br>
        4. Orders will sync automatically!
    </div>
</div>

<script>
    const FULL_MENU = [
        { id: "pizza", name: "Pizza", price: "₹249", emoji: "🍕" },
        { id: "burger", name: "Burger", price: "₹99", emoji: "🍔" },
        { id: "dabeli", name: "Dabeli", price: "₹45", emoji: "🥪" },
        { id: "vadapau", name: "Vada Pau", price: "₹35", emoji: "🥖" },
        { id: "noodles", name: "Noodles", price: "₹129", emoji: "🍜" },
        { id: "maggie", name: "Maggie", price: "₹59", emoji: "🍲" },
        { id: "manchurian", name: "Manchurian", price: "₹149", emoji: "🥘" },
        { id: "paf", name: "Pav Bhaji", price: "₹109", emoji: "🍛" },
        { id: "sandwich", name: "Sandwich", price: "₹89", emoji: "🥪" },
        { id: "dosa", name: "Dosa", price: "₹79", emoji: "🥞" },
        { id: "idali", name: "Idli", price: "₹49", emoji: "🍚" }
    ];

    let selectedItemsMap = new Map();
    let roomCode = localStorage.getItem('roomCode') || Math.floor(100000 + Math.random() * 900000).toString();
    
    function renderMenuUI() {
        const grid = document.getElementById('itemsGrid');
        if (!grid) return;
        grid.innerHTML = '';
        FULL_MENU.forEach(item => {
            const isSelected = selectedItemsMap.has(item.id);
            const card = document.createElement('div');
            card.className = `food-card ${isSelected ? 'selected' : ''}`;
            card.innerHTML = `
                <span class="food-emoji">${item.emoji}</span>
                <div class="food-name">${item.name}</div>
                <div class="food-price">${item.price}</div>
                <div class="select-icon">${isSelected ? '✓ SELECTED' : '⚪ TAP'}</div>
            `;
            card.onclick = () => toggleItemSelection(item);
            grid.appendChild(card);
        });
        updateCartBadge();
    }

    function toggleItemSelection(item) {
        if (selectedItemsMap.has(item.id)) {
            selectedItemsMap.delete(item.id);
            showToast(`❌ Removed ${item.name}`, 1200);
        } else {
            selectedItemsMap.set(item.id, { ...item, quantity: 1 });
            showToast(`✅ Added ${item.name}`, 1000);
        }
        renderMenuUI();
    }

    function updateCartBadge() {
        const badge = document.getElementById('cartCountBadge');
        if (badge) {
            const count = selectedItemsMap.size;
            badge.innerText = count === 0 ? "0 selected" : `${count} item${count > 1 ? 's' : ''} selected`;
        }
    }

    function showToast(msg, duration = 1800) {
        const toastDiv = document.getElementById('menuToast');
        toastDiv.innerText = msg;
        toastDiv.style.opacity = '1';
        setTimeout(() => toastDiv.style.opacity = '0', duration);
    }

    function addNewOrder(selectedItemsArray) {
        if (!selectedItemsArray.length) {
            showToast("⚠️ Please select at least one item!", 2000);
            return;
        }
        
        const order = {
            id: 'ORD-' + Date.now(),
            time: new Date().toLocaleTimeString(),
            items: selectedItemsArray,
            timestamp: Date.now()
        };
        
        // Store in localStorage for same-device sync
        let orders = JSON.parse(localStorage.getItem('pending_orders') || '[]');
        orders.push(order);
        localStorage.setItem('pending_orders', JSON.stringify(orders));
        
        showToast(`✅ Order placed! ${selectedItemsArray.length} item(s)`, 2000);
        selectedItemsMap.clear();
        renderMenuUI();
        
        // Trigger storage event for chef dashboard on same device
        window.dispatchEvent(new Event('storage'));
    }

    document.getElementById('confirmOrderBtn').onclick = () => addNewOrder(Array.from(selectedItemsMap.values()));
    document.getElementById('clearSelectionBtn').onclick = () => {
        selectedItemsMap.clear();
        renderMenuUI();
        showToast("All items deselected", 1200);
    };
    
    renderMenuUI();
</script>
</body>
</html>
